<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmo Playstation - E-Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; }
        .glow { filter: drop-shadow(0 0 12px rgba(6, 182, 212, 0.7)); }
    </style>
</head>
<body class="font-sans antialiased min-h-screen pb-32">

    <div id="halaman-konsumen">
        <header class="bg-slate-900 border-b border-cyan-500/30 p-5 text-center shadow-lg shadow-cyan-500/10">
            <div class="w-24 h-24 mx-auto mb-2 flex items-center justify-center rounded-full bg-slate-950 border border-cyan-500/30 glow">
                <span class="text-3xl">🎮</span>
            </div>
            <h1 class="text-xl font-black tracking-wider text-cyan-400 uppercase">COSMO PLAYSTATION</h1>
            <p class="text-[10px] text-slate-400 tracking-widest uppercase">Smart Order System</p>
            <div class="inline-block mt-3 bg-cyan-500/20 border border-cyan-400 px-4 py-1 rounded-full text-xs font-bold text-cyan-300">
                🎮 <span id="nomor-tv">TV 1</span>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-6">
            <div>
                <h2 class="text-xs font-bold text-cyan-400 tracking-widest uppercase mb-3 border-l-4 border-cyan-500 pl-2">MINUMAN ES / PANAS</h2>
                <div id="container-minuman" class="space-y-2"></div>
            </div>
            <div>
                <h2 class="text-xs font-bold text-cyan-400 tracking-widest uppercase mb-3 border-l-4 border-cyan-500 pl-2">MAKANAN</h2>
                <div id="container-makanan" class="space-y-2"></div>
            </div>
        </main>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 border-t border-slate-800 p-4 flex items-center justify-between z-40">
            <div>
                <p class="text-[10px] text-slate-400">Total:</p>
                <p id="total-display" class="text-lg font-black text-cyan-400">Rp 0</p>
            </div>
            <button onclick="kirimKeCloud()" class="bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold px-5 py-3 rounded-xl text-xs tracking-wide shadow-lg shadow-cyan-500/20">
                KIRIM ORDERAN
            </button>
        </div>
    </div>

    <div id="halaman-operator" class="hidden p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
            <h2 class="text-lg font-black text-cyan-400">DASHBOARD KASIR - COSMO</h2>
            <span class="bg-emerald-500/20 border border-emerald-500 text-emerald-400 px-2 py-0.5 rounded text-[10px] font-bold animate-pulse">● Monitoring Aktif</span>
        </div>
        <div id="container-pesanan" class="space-y-3">
            </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nomorTv = urlParams.get('tv') || '1';
        
        // JIKA LINKNYA ADA '?role=kasir', MAKA AKAN JADI HALAMAN OPERATOR
        const role = urlParams.get('role') || 'konsumen'; 

        document.getElementById('nomor-tv').innerText = 'TV ' + nomorTv;

        // DATABASE CLOUD BEBAS LIMIT (Menggunakan KV Storage publik untuk sinkronisasi antar HP)
        const dbCloudUrl = "https://api.restfulapi.dev/objects";
        // ID unik penanda grup rental milikmu agar tidak bercampur dengan orang lain
        const cosmoToken = "cosmo_ps_group_2026"; 

        const dataMenu = {
            minuman: [
                { id: 'teajus', nama: 'Tea Jus', harga: 2000 },
                { id: 'marimas', nama: 'Marimas', harga: 2000 },
                { id: 'esteh', nama: 'Es Teh', harga: 3000 },
                { id: 'nutrisari', nama: 'Nutrisari', harga: 4000 },
                { id: 'segardingin', nama: 'Segar Dingin', harga: 4000 },
                { id: 'popice', nama: 'Popice', harga: 4000 },
                { id: 'susuputih', nama: 'Susu Putih', harga: 4000 },
                { id: 'susucoklat', nama: 'Susu Coklat', harga: 4000 },
                { id: 'whitecoffe', nama: 'White Coffe', harga: 4000 },
                { id: 'tarikmalaka', nama: 'White Coffe Tarik Malaka', harga: 4000 },
                { id: 'gulaaren', nama: 'Top Gula Aren', harga: 4000 },
                { id: 'indocafemix', nama: 'Indocafe Mix', harga: 4000 },
                { id: 'kapalapimix', nama: 'Kapal Api Mix', harga: 4000 },
                { id: 'kapalapitg', nama: 'Kapal Api Tanpa Gula', harga: 4000 },
                { id: 'cappucino', nama: 'Cappucino', harga: 5000 },
                { id: 'bengbeng', nama: 'Beng - Beng', harga: 5000 },
                { id: 'chocolatos', nama: 'Chocolatos', harga: 5000 },
                { id: 'milo', nama: 'Milo', harga: 5000 },
                { id: 'esteko', nama: 'Es Teko Tea jus/Marimas', harga: 5000 }
            ],
            makanan: [
                { id: 'snack', nama: 'Snack - Snack', harga: 3000 },
                { id: 'roti', nama: 'Roti', harga: 3000 },
                { id: 'indomiegoreng', nama: 'Indomie Goreng', harga: 6000 },
                { id: 'indomietelur', nama: 'Indomie Goreng Telur', harga: 9000 },
                { id: 'sarimikuah', nama: 'Sarimi Kuah', harga: 6000 },
                { id: 'sarimitelur', nama: 'Sarimi Kuah Telur', harga: 9000 }
            ]
        };

        let keranjang = {};
        let totalHarga = 0;

        function renderMenu() {
            ['minuman', 'makanan'].forEach(kategori => {
                let html = '';
                dataMenu[kategori].forEach(item => {
                    keranjang[item.id] = { nama: item.nama, harga: item.harga, qty: 0 };
                    html += `
                        <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-3 flex items-center justify-between">
                            <div>
                                <h3 class="font-bold text-white text-sm">${item.nama}</h3>
                                <p class="text-cyan-400 font-medium text-xs">Rp ${item.harga.toLocaleString('id-ID')}</p>
                            </div>
                            <div class="flex items-center space-x-2 bg-slate-800 rounded-lg p-1">
                                <button onclick="ubahQty('${item.id}', -1)" class="w-7 h-7 rounded bg-slate-700 font-bold text-cyan-400 text-sm">-</button>
                                <span id="qty-${item.id}" class="font-bold w-4 text-center text-sm">0</span>
                                <button onclick="ubahQty('${item.id}', 1)" class="w-7 h-7 rounded bg-slate-700 font-bold text-cyan-400 text-sm">+</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('container-' + kategori).innerHTML = html;
            });
        }

        function ubahQty(id, ubah) {
            let item = keranjang[id];
            if (item.qty + ubah >= 0) {
                item.qty += ubah;
                totalHarga += ubah * item.harga;
                document.getElementById('qty-' + id).innerText = item.qty;
                document.getElementById('total-display').innerText = 'Rp ' + totalHarga.toLocaleString('id-ID');
            }
        }

        // KIRIM DATA KE CLOUD SERVER (Konsumen)
        function kirimKeCloud() {
            if (totalHarga === 0) return alert('Pilih menunya dulu bos!');

            let rincianMenu = [];
            for (let id in keranjang) {
                if (keranjang[id].qty > 0) rincianMenu.push(`${keranjang[id].nama} (${keranjang[id].qty}x)`);
            }

            let payload = {
                name: cosmoToken,
                data: {
                    tv: nomorTv,
                    items: rincianMenu.join(', '),
                    total: 'Rp ' + totalHarga.toLocaleString('id-ID'),
                    waktu: new Date().toLocaleTimeString('id-ID')
                }
            };

            fetch(dbCloudUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(() => {
                alert(`Pesanan dari TV ${nomorTv} sukses terkirim ke HP Kasir!`);
                resetForm();
            })
            .catch(() => alert('Gagal kirim, cek koneksi internet HP-mu!'));
        }

        function resetForm() {
            for (let id in keranjang) { keranjang[id].qty = 0; let el = document.getElementById('qty-' + id); if (el) el.innerText = 0; }
            totalHarga = 0; document.getElementById('total-display').innerText = 'Rp 0';
        }

        // TARIK DATA REAL-TIME DARI CLOUD SERVER (Kasir)
        function loadPesananCloud() {
            fetch(dbCloudUrl)
            .then(res => res.json())
            .then(allData => {
                let container = document.getElementById('container-pesanan');
                // Filter hanya data milik Cosmo Playstation
                let myOrders = allData.filter(obj => obj.name === cosmoToken);

                if(!myOrders || myOrders.length === 0) {
                    container.innerHTML = '<p class="text-slate-500 text-center text-sm py-8">Belum ada pesanan masuk...</p>';
                    return;
                }

                myOrders.reverse(); // Taruh pesanan baru di paling atas
                container.innerHTML = '';
                myOrders.forEach(order => {
                    container.innerHTML += `
                        <div class="bg-slate-900 border border-cyan-500/40 rounded-xl p-4 shadow-lg shadow-cyan-500/5">
                            <div class="flex justify-between items-center mb-2">
                                <span class="bg-cyan-500 text-slate-950 px-2 py-0.5 rounded text-xs font-bold">TV ${order.data.tv}</span>
                                <span class="text-xs text-slate-400 font-bold">${order.data.waktu} - ${order.data.total}</span>
                            </div>
                            <p class="text-sm text-white font-medium mb-3">${order.data.items}</p>
                            <div class="flex justify-end">
                                <button onclick="selesaikanOrderCloud('${order.id}')" class="bg-emerald-500 text-slate-950 font-bold px-3 py-1 rounded text-xs hover:bg-emerald-600">Selesai Diantar</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function selesaikanOrderCloud(id) {
            fetch(`${dbCloudUrl}/${id}`, { method: 'DELETE' }).then(() => loadPesananCloud());
        }

        // SISTEM DETERMINASI HALAMAN (KONSUMEN VS OPERATOR)
        if (role === 'kasir') {
            document.getElementById('halaman-konsumen').classList.add('hidden');
            document.getElementById('halaman-operator').classList.remove('hidden');
            loadPesananCloud();
            // Kasir nge-refresh otomatis data cloud setiap 3 detik
            setInterval(loadPesananCloud, 3000);
        } else {
            renderMenu();
        }
    </script>
</body>
</html>
